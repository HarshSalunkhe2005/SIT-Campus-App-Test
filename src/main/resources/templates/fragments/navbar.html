<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- NAVBAR FRAGMENT -->
<nav th:fragment="navbar(role)" class="navbar">
    <div class="navbar-container">
        <!-- Logo & Brand -->
        <div class="navbar-brand">
            <img src="/images/logo.png" alt="Campus" class="logo-img">
            <span class="brand-text">Campus Portal</span>
        </div>

        <!-- Center: App Title -->
        <div class="navbar-title">
            <h1 th:text="${role == 'ADMIN' ? 'Admin Dashboard' : role == 'DEPT' ? 'Department Dashboard' : 'Student Dashboard'}"></h1>
        </div>

        <!-- Right: User Menu -->
        <div class="navbar-right">
            <!-- Notifications (visual indicator — backend integration pending) -->
            <div class="notification-bell" title="Notifications coming soon">
                <svg class="bell-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="notification-badge" th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
            </div>

            <!-- Direct Logout Button -->
            <button type="button" class="logout-icon-btn" title="Logout" onclick="handleLogout()" style="display:flex; align-items:center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>

            <!-- User Profile Dropdown -->
            <div class="user-dropdown">
                <button class="user-button">
                    <img src="/images/default-avatar.png" alt="User" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'">
                    <span class="user-name" th:text="${userName}">User</span>
                    <svg class="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="dropdown-menu">
                    <a th:href="${role == 'ADMIN' ? '/admin/hub' : role == 'DEPT' ? '/dept/kanban' : '/student/dashboard'}"
                       class="dropdown-item">Dashboard</a>
                    <hr class="dropdown-divider">
                    <button type="button" class="dropdown-item logout-btn" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<script>
    function handleLogout() {
        localStorage.removeItem('jwt_token');
        localStorage.removeItem('user_role');
        localStorage.removeItem('user_email');
        localStorage.removeItem('departmentId');
        window.location.href = '/auth/login.html'; 
    }
</script>

</body>
</html>

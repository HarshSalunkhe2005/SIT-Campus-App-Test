<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT Campus App - Verify PRN</title>
    <link rel="stylesheet" href="../../static/css/shared/base.css" th:href="@{/css/shared/base.css}">
    <link rel="stylesheet" href="../../static/css/auth/login.css" th:href="@{/css/auth/login.css}">
    <link rel="stylesheet" href="../../static/css/auth/verify-prn.css" th:href="@{/css/auth/verify-prn.css}">
</head>
<body>
    <main class="sit-split-layout">
        <section class="sit-brand-pane">
            <div class="sit-brand-content">
                <img src="../../static/images/Symlogo333.jpg" th:src="@{/images/Symlogo333.jpg}" alt="SIT Pune Logo" class="sit-brand-logo">
                <h1 class="sit-brand-title">SIT Pune</h1>
                <h2 class="sit-brand-subtitle">Campus App</h2>
                <p class="sit-brand-description">A transparent, high-speed portal to report and track infrastructure issues across the campus.</p>
            </div>
        </section>

        <section class="sit-form-pane">
            <div class="sit-auth-card">
                <h3 class="sit-auth-card__header">Create Your Account</h3>
                <form id="registrationForm" class="sit-auth-form">
                    <div class="sit-input-group">
                        <label for="prn" class="sit-input-label">Permanent Registration Number (PRN)</label>
                        <div class="sit-input-wrapper">
                            <input type="text" id="prn" name="prn" class="sit-input-field" placeholder="e.g., 24070126..." required maxlength="11">
                            <span id="prnCheck" class="validation-checkmark">✓</span>
                        </div>
                    </div>
                    <div class="sit-input-group">
                        <label for="email" class="sit-input-label">Official SIT Email</label>
                        <div class="sit-input-wrapper">
                            <input type="email" id="email" name="email" class="sit-input-field" placeholder="firstname.lastname.btech2024@sitpune.edu.in" required>
                            <span id="emailCheck" class="validation-checkmark">✓</span>
                        </div>
                    </div>
                    <div id="error-container" class="error-container" style="display: none;">
                        <p id="error-message" class="error-message"></p>
                    </div>
                    <button type="submit" id="submitBtn" class="sit-auth-card__submit" disabled>Send Verification Code</button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const prnInput = document.getElementById('prn');
        const emailInput = document.getElementById('email');
        const prnCheck = document.getElementById('prnCheck');
        const emailCheck = document.getElementById('emailCheck');

        const validate = () => {
            const isPrnValid = prnInput.value.length === 11;
            const isEmailValid = emailInput.value.toLowerCase().endsWith('@sitpune.edu.in');
            
            prnCheck.classList.toggle('is-visible', isPrnValid);
            emailCheck.classList.toggle('is-visible', isEmailValid);
            submitBtn.disabled = !(isPrnValid && isEmailValid);
        };

        prnInput.addEventListener('input', validate);
        emailInput.addEventListener('input', validate);

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            const response = await fetch('http://localhost:8080/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput.value, prn: prnInput.value })
            });

            if (response.ok) {
                sessionStorage.setItem('tempUserEmail', emailInput.value);
                window.location.href = "setup-password.html";
            } else {
                const err = await response.text();
                document.getElementById('error-message').textContent = err;
                document.getElementById('error-container').style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Verification Code';
            }
        });
    </script>
</body>
</html>

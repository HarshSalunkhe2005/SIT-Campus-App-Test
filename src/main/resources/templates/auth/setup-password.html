<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT Campus App - Setup Password</title>
    <link rel="stylesheet" href="../../static/css/shared/base.css" th:href="@{/css/shared/base.css}">
    <link rel="stylesheet" href="../../static/css/auth/login.css" th:href="@{/css/auth/login.css}">
    <link rel="stylesheet" href="../../static/css/auth/setup-password.css" th:href="@{/css/auth/setup-password.css}">
</head>
<body>
    <main class="sit-split-layout">
        <section class="sit-brand-pane">
            <div class="sit-brand-content">
                <img src="../../static/images/Symlogo333.jpg" th:src="@{/images/Symlogo333.jpg}" alt="SIT Pune Logo" class="sit-brand-logo">
                <h1 class="sit-brand-title">SIT Pune</h1>
                <h2 class="sit-brand-subtitle">Campus App</h2>
                <p class="sit-brand-description">One final step to secure your portal and begin reporting campus issues.</p>
            </div>
        </section>

        <section class="sit-form-pane">
            <div class="sit-auth-card">
                <h3 class="sit-auth-card__header">Complete Registration</h3>
                
                <form id="setupForm" class="sit-auth-form">
                    <div class="sit-input-group">
                        <label for="otp" class="sit-input-label">Verification Code (OTP)</label>
                        <div class="sit-input-wrapper">
                            <svg class="sit-input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                            <input type="text" id="otp" name="otp" class="sit-input-field sit-input-field--icon" placeholder="6-digit code" required maxlength="6" inputmode="numeric" aria-label="One-time password">
                        </div>
                        <small id="otpHelp" class="sit-input-help"></small>
                    </div>
                    
                    <div id="password-section" style="display: none;">
                        <div class="sit-input-group">
                            <label for="password" class="sit-input-label">Create Password</label>
                            <div class="sit-input-wrapper">
                                <svg class="sit-input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                <input type="password" id="password" name="password" class="sit-input-field sit-input-field--icon" placeholder="At least 8 characters" aria-label="Create password">
                            </div>
                            <div class="sit-strength-meter">
                                <div id="strength-bar" class="sit-strength-meter__bar"></div>
                            </div>
                            <p id="strength-text" class="sit-strength-meter__text" aria-live="polite">Password Strength</p>
                        </div>

                        <div class="sit-input-group">
                            <label for="confirmPassword" class="sit-input-label">Confirm Password</label>
                            <div class="sit-input-wrapper">
                                <svg class="sit-input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="sit-input-field sit-input-field--icon" placeholder="Repeat your password" aria-label="Confirm password">
                            </div>
                            <small id="confirmHelp" class="sit-input-help"></small>
                        </div>
                    </div>

                    <div id="error-container" class="error-container" style="display: none;" role="alert">
                        <p id="error-message" class="error-message"></p>
                    </div>

                    <button type="button" id="verify-btn" class="sit-auth-card__submit">Verify OTP</button>
                    <button type="submit" id="submit-btn" class="sit-auth-card__submit" style="display: none;" disabled>Create Account</button>
                </form>

                <div class="sit-auth-footer">
                    <p class="sit-auth-footer__text">Didn't get the code?</p>
                    <button type="button" id="resend-btn" class="sit-auth-footer__link">Resend OTP</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const email = sessionStorage.getItem('tempUserEmail');
        if (!email) window.location.href = 'verify-prn.html';

        const verifyBtn = document.getElementById('verify-btn');
        const submitBtn = document.getElementById('submit-btn');
        const resendBtn = document.getElementById('resend-btn');
        const passwordSection = document.getElementById('password-section');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const otpInput = document.getElementById('otp');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        const confirmHelp = document.getElementById('confirmHelp');
        const otpHelp = document.getElementById('otpHelp');

        let isOtpVerified = false;
        let passwordStrength = 0;

        // Function to check password strength
        const checkPasswordStrength = () => {
            const val = passwordInput.value;
            strengthBar.className = 'sit-strength-meter__bar';
            let strength = 0;

            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            passwordStrength = strength;
            
            if (val.length === 0) {
                strengthText.textContent = 'Password Strength';
                strengthBar.style.width = '0%';
            } else if (strength <= 1) {
                strengthText.textContent = 'Weak ⚠️';
                strengthBar.classList.add('is-weak');
            } else if (strength === 2 || strength === 3) {
                strengthText.textContent = 'Medium ✓';
                strengthBar.classList.add('is-medium');
            } else {
                strengthText.textContent = 'Strong ✓✓';
                strengthBar.classList.add('is-strong');
            }

            validatePasswordMatch();
            updateSubmitButtonState();
        };

        // Validate password match
        const validatePasswordMatch = () => {
            if (confirmInput.value && passwordInput.value !== confirmInput.value) {
                confirmHelp.textContent = 'Passwords do not match';
                confirmHelp.style.color = '#ff4d4d';
            } else {
                confirmHelp.textContent = '';
            }
        };

        // Update submit button state
        const updateSubmitButtonState = () => {
            submitBtn.style.display = 'block';
            if (isOtpVerified && passwordStrength >= 2 && passwordInput.value && confirmInput.value && passwordInput.value === confirmInput.value) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        };

        // Clear errors on input
        const clearError = () => {
            errorContainer.style.display = 'none';
            errorMessage.textContent = '';
        };

        otpInput.addEventListener('input', clearError);
        passwordInput.addEventListener('input', checkPasswordStrength);
        confirmInput.addEventListener('input', validatePasswordMatch);
        confirmInput.addEventListener('input', updateSubmitButtonState);

        // Step 1: Verify OTP
        verifyBtn.addEventListener('click', async () => {
            const otp = otpInput.value.trim();
            clearError();

            if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
                errorMessage.textContent = 'Please enter a valid 6-digit OTP.';
                errorContainer.style.display = 'block';
                otpHelp.textContent = 'Must be 6 digits';
                otpHelp.style.color = '#ff4d4d';
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';

            try {
                const response = await fetch('http://localhost:8080/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });

                const result = await response.text();

                if (response.ok) {
                    isOtpVerified = true;
                    verifyBtn.style.display = 'none';
                    passwordSection.style.display = 'block';
                    resendBtn.style.display = 'none';
                    otpInput.setAttribute('readonly', '');

                    document.querySelector('.sit-auth-footer__text').style.display = 'none';

                    updateSubmitButtonState();
                    otpHelp.textContent = '✓ Verified';
                    otpHelp.style.color = '#28a745';
                    passwordInput.focus();
                } else {
                    errorMessage.textContent = result || 'OTP verification failed.';
                    errorContainer.style.display = 'block';
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify OTP';
                }
            } catch (err) {
                errorMessage.textContent = 'Server connection failed. Please try again.';
                errorContainer.style.display = 'block';
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify OTP';
            }
        });

        // Resend OTP
        resendBtn.addEventListener('click', async () => {
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending...';
            clearError();

            try {
                const response = await fetch('http://localhost:8080/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    errorMessage.textContent = 'OTP sent to your email!';
                    errorContainer.style.display = 'block';
                    errorContainer.style.backgroundColor = 'rgba(40, 167, 69, 0.1)';
                    errorContainer.style.borderLeftColor = '#28a745';
                    errorMessage.style.color = '#28a745';
                    
                    // Reset OTP input
                    otpInput.value = '';
                    otpInput.removeAttribute('readonly');
                    isOtpVerified = false;
                    verifyBtn.style.display = 'block';
                    passwordSection.style.display = 'none';
                    otpHelp.textContent = '';
                    
                    setTimeout(() => {
                        errorContainer.style.backgroundColor = '';
                        errorContainer.style.borderLeftColor = '';
                        errorMessage.style.color = '';
                        errorContainer.style.display = 'none';
                        resendBtn.disabled = false;
                        resendBtn.textContent = 'Resend OTP';
                    }, 3000);
                } else {
                    errorMessage.textContent = await response.text() || 'Failed to resend OTP.';
                    errorContainer.style.display = 'block';
                    resendBtn.disabled = false;
                    resendBtn.textContent = 'Resend OTP';
                }
            } catch (err) {
                errorMessage.textContent = 'Server connection failed.';
                errorContainer.style.display = 'block';
                resendBtn.disabled = false;
                resendBtn.textContent = 'Resend OTP';
            }
        });

        // Step 2: Set Password
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            clearError();

            // Final validation
            if (password.length < 8) {
                errorMessage.textContent = 'Password must be at least 8 characters.';
                errorContainer.style.display = 'block';
                return;
            }

            if (passwordStrength < 2) {
                errorMessage.textContent = 'Password strength must be at least Medium.';
                errorContainer.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                errorMessage.textContent = 'Passwords do not match!';
                errorContainer.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';

            try {
                const response = await fetch('http://localhost:8080/auth/set-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    errorMessage.textContent = '✓ Account Created Successfully!';
                    errorContainer.style.display = 'block';
                    errorContainer.style.backgroundColor = 'rgba(40, 167, 69, 0.1)';
                    errorContainer.style.borderLeftColor = '#28a745';
                    errorMessage.style.color = '#28a745';
                    
                    setTimeout(() => {
                        sessionStorage.removeItem('tempUserEmail');
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMessage.textContent = await response.text() || 'Account creation failed.';
                    errorContainer.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (err) {
                errorMessage.textContent = 'Server connection failed. Please try again.';
                errorContainer.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
